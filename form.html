<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Registration Form</title>
</head>
<body>
    <h1>University Registration Form</h1>

    <form action="/summit" method="post">
        <fieldset>
            <legend>Personal Details</legend>

            <p>
                <label for="fullName">Full Name:</label><br>
                <input type="text" id="fullName" name="fullName" required>
            </p>

            <p>
                <label for="fatherName">Father's Name:</label><br>
                <input type="text" id="fatherName" name="fatherName" required>
            </p>

            <p>
                <label for="city">City:</label><br>
                <select id="city" name="city" required>
                    <option value="">-- Select City --</option>
                    <option value="ahmedabad">Ahmedabad</option>
                    <option value="bengaluru">Bengaluru</option>
                    <option value="chennai">Chennai</option>
                    <option value="delhi">Delhi</option>
                    <option value="hyderabad">Hyderabad</option>
                    <option value="mumbai">Mumbai</option>
                    <option value="pune">Pune</option>
                    <option value="other">Other</option>
                </select>
            </p>

            <p>
                <label>Gender:</label><br>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label><br>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label><br>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            </p>

            <p>
                <label for="dob">Date of Birth:</label><br>
                <input type="date" id="dob" name="dob" required>
            </p>
        </fieldset>

        <fieldset>
            <legend>Academic Details</legend>

            <p>
                <label for="course">Course:</label><br>
                <select id="course" name="course" required>
                    <option value="">-- Select Course --</option>
                    <option value="bca">BCA</option>
                    <option value="bba">BBA</option>
                    <option value="btech">B.Tech</option>
                    <option value="bcom">B.Com</option>
                    <option value="mba">MBA</option>
                    <option value="mca">MCA</option>
                </select>
            </p>

            <p>
                <label for="year">Admission Year:</label><br>
                <select id="year" name="year" required>
                    <option value="">-- Select Year --</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
            </p>

            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="phone">Mobile Number:</label><br>
                <input type="tel" id="phone" name="phone" required>
            </p>
        </fieldset>

        <fieldset>
            <legend>Skills and Interests</legend>

            <p>
                <label>Skills:</label><br>
                <input type="checkbox" id="skillHtml" name="skills" value="html">
                <label for="skillHtml">HTML</label><br>
                <input type="checkbox" id="skillCss" name="skills" value="css">
                <label for="skillCss">CSS</label><br>
                <input type="checkbox" id="skillJavaScript" name="skills" value="javascript">
                <label for="skillJavaScript">JavaScript</label><br>
                <input type="checkbox" id="skillJava" name="skills" value="java">
                <label for="skillJava">Java</label><br>
                <input type="checkbox" id="skillCpp" name="skills" value="cpp">
                <label for="skillCpp">C++</label>
            </p>

            <p>
                <label for="hobby">Favorite Subject:</label><br>
                <input list="subjects" id="hobby" name="favoriteSubject">
                <datalist id="subjects">
                    <option value="Computer Science">
                    <option value="Mathematics">
                    <option value="Physics">
                    <option value="English">
                    <option value="Commerce">
                </datalist>
            </p>
        </fieldset>

        <p>
            <label for="address">Address:</label><br>
            <textarea id="address" name="address" rows="4" cols="30" required></textarea>
        </p>

        <p>
            <input type="submit" value="Submit Form">
            <input type="reset" value="Reset Form"> 
        </p>
    </form>
</body>
</html>
